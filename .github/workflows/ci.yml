name: CI

on:
  push:
    branches:
      - main
      - 'releases/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Install dependencies
        run: make install

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

  build:
    name: Build dist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Install dependencies
        run: make install

      - name: Build action bundle
        run: make build

      - name: Verify dist is up to date
        # Fails the build if the compiled dist/ differs from what's committed,
        # reminding developers to commit the rebuilt bundle.
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'make build' locally and commit the result."
            git diff dist/
            exit 1
          fi

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    needs:
      - build
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run with width and height
        id: image-check-01
        uses: ./
        with:
          paths: '__tests__/fixtures'
          max-width: '640'
          max-height: '480'
          fail-on-error: false
          summary-title: 'Run with image and height'

      - name: Run with size
        id: image-check-02
        uses: ./
        with:
          paths: '__tests__/fixtures'
          max-size: '524288'
          fail-on-error: false
          summary-title: 'Run with size'

      - name: Display Summary
        if: ${{ success() || failure() }}
        run: |
          echo "# Self test results" >> $GITHUB_STEP_SUMMARY
          echo "## Check width and height" >> $GITHUB_STEP_SUMMARY
          echo "- Failed files : ${{ steps.image-check-01.outputs.failed-files }}" >> $GITHUB_STEP_SUMMARY
          echo "- Failed count : ${{ steps.image-check-01.outputs.failed-count }}" >> $GITHUB_STEP_SUMMARY
          echo "## Check size" >> $GITHUB_STEP_SUMMARY
          echo "- Failed files : ${{ steps.image-check-02.outputs.failed-files }}" >> $GITHUB_STEP_SUMMARY
          echo "- Failed count : ${{ steps.image-check-02.outputs.failed-count }}" >> $GITHUB_STEP_SUMMARY

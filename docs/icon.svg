<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>

    <!-- Circle gradient (main focal circle) -->
    <radialGradient id="circleGrad" cx="42%" cy="38%" r="60%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </radialGradient>

    <!-- Magnifier lens gradient -->
    <radialGradient id="lensGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#a8edea;stop-opacity:0.08" />
    </radialGradient>

    <!-- Clip path for the image icon inside lens -->
    <clipPath id="lensClip">
      <circle cx="210" cy="210" r="118" />
    </clipPath>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Handle shadow -->
    <filter id="handleShadow" x="-20%" y="-20%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)" />

  <!-- ── Magnifier handle ── -->
  <line x1="308" y1="308" x2="420" y2="420"
        stroke="#e2e8f0" stroke-width="42" stroke-linecap="round"
        filter="url(#handleShadow)" />
  <!-- Handle accent stripe -->
  <line x1="315" y1="315" x2="410" y2="410"
        stroke="#ffffff" stroke-width="12" stroke-linecap="round"
        opacity="0.25" />

  <!-- ── Magnifier outer ring (lens border) ── -->
  <circle cx="210" cy="210" r="148"
          fill="none" stroke="#e2e8f0" stroke-width="30"
          filter="url(#shadow)" />

  <!-- ── Gradient circle fill (lens interior) ── -->
  <circle cx="210" cy="210" r="133" fill="url(#circleGrad)" />

  <!-- ── Tiny image icon inside the lens ── -->
  <g clip-path="url(#lensClip)">
    <!-- Image frame -->
    <rect x="118" y="138" width="184" height="144" rx="14"
          fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-width="4" stroke-opacity="0.5" />

    <!-- Sky / top band -->
    <rect x="122" y="142" width="176" height="68" rx="10"
          fill="#93c5fd" fill-opacity="0.55" />

    <!-- Sun -->
    <circle cx="270" cy="168" r="20"
            fill="#fde68a" fill-opacity="0.9" />

    <!-- Mountain / triangle -->
    <polygon points="130,272 188,192 246,272"
             fill="#a7f3d0" fill-opacity="0.75" />
    <!-- Second mountain -->
    <polygon points="186,272 248,210 310,272"
             fill="#6ee7b7" fill-opacity="0.65" />

    <!-- Ground strip -->
    <rect x="122" y="262" width="176" height="16" rx="4"
          fill="#d1fae5" fill-opacity="0.45" />
  </g>

  <!-- ── Lens glass sheen ── -->
  <circle cx="210" cy="210" r="133" fill="url(#lensGrad)" />

  <!-- Lens rim highlight -->
  <circle cx="210" cy="210" r="148"
          fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.2" />

  <!-- Top-left glint on lens -->
  <ellipse cx="162" cy="158" rx="28" ry="16"
           fill="#ffffff" fill-opacity="0.18" transform="rotate(-35 162 158)" />
</svg>
